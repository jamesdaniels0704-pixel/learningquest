<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Quest</title>
<style>
:root{
  --bg:#f8fafc;
  --bg-soft:#eef4ff;
  --panel:#ffffff;
  --panel-2:#f8fbff;
  --line:#dbe7f5;
  --text:#142133;
  --muted:#5b6b80;
  --primary:#4f46e5;
  --primary-dark:#3730a3;
  --accent:#0ea5e9;
  --gold1:#ffe58f;
  --gold2:#f6c445;
  --gold-text:#6a4700;
  --success:#16a34a;
  --danger:#dc2626;
  --shadow:0 18px 40px rgba(31,41,55,0.10);
  --hero-overlay-1:rgba(79,70,229,0.08);
  --hero-overlay-2:rgba(14,165,233,0.12);
  --card-radius:30px;
  --flashcard-radius:24px;
  --button-text:#ffffff;
  --topbar-score-shadow:drop-shadow(0 8px 18px rgba(246,196,69,0.28));
  --topic-photo-filter:none;
}

/* Default / menu theme */
body[data-theme="default"]{
  --bg:#f8fafc;
  --bg-soft:#eef4ff;
  --panel:#ffffff;
  --panel-2:#f8fbff;
  --line:#dbe7f5;
  --text:#142133;
  --muted:#5b6b80;
  --primary:#4f46e5;
  --primary-dark:#3730a3;
  --accent:#0ea5e9;
  --gold1:#ffe58f;
  --gold2:#f6c445;
  --gold-text:#6a4700;
  --shadow:0 18px 40px rgba(31,41,55,0.10);
  --hero-overlay-1:rgba(79,70,229,0.08);
  --hero-overlay-2:rgba(14,165,233,0.12);
  --button-text:#ffffff;
  --topic-photo-filter:none;
}

/* Kerma / archaeology - Ancient Scroll */
body[data-theme="kerma"]{
  --bg:#e8d6b5;
  --bg-soft:#d7bd92;
  --panel:#f5e7cc;
  --panel-2:#eddab7;
  --line:#c7a774;
  --text:#4c3219;
  --muted:#7a5938;
  --primary:#8a5a2f;
  --primary-dark:#5f3d1d;
  --accent:#c18a3a;
  --gold1:#efd18d;
  --gold2:#cb963e;
  --gold-text:#5c3c14;
  --shadow:0 18px 42px rgba(84,54,23,0.16);
  --hero-overlay-1:rgba(143,95,40,0.10);
  --hero-overlay-2:rgba(88,58,24,0.08);
  --button-text:#fffaf0;
  --topic-photo-filter:sepia(0.28) saturate(0.9) contrast(1.02);
}

/* Wildfire / AI robotics - Smart Tablet */
body[data-theme="wildfire"]{
  --bg:#191412;
  --bg-soft:#2a1d17;
  --panel:#241a16;
  --panel-2:#31211b;
  --line:#65402d;
  --text:#f3e7db;
  --muted:#d2b39d;
  --primary:#d75b21;
  --primary-dark:#a33f13;
  --accent:#f59e0b;
  --gold1:#ffd07a;
  --gold2:#ea8820;
  --gold-text:#5a2e00;
  --shadow:0 20px 44px rgba(0,0,0,0.30);
  --hero-overlay-1:rgba(215,91,33,0.16);
  --hero-overlay-2:rgba(245,158,11,0.10);
  --button-text:#fff7f0;
  --topic-photo-filter:saturate(1.15) contrast(1.05) brightness(0.94);
}

/* Marine - Nautical Parchment */
body[data-theme="marine"]{
  --bg:#dff2f6;
  --bg-soft:#c4e8ef;
  --panel:#f5fdff;
  --panel-2:#dff3f8;
  --line:#97cad4;
  --text:#123843;
  --muted:#4d727a;
  --primary:#137d94;
  --primary-dark:#0d5d70;
  --accent:#20aab8;
  --gold1:#d2f2f6;
  --gold2:#89d5df;
  --gold-text:#154853;
  --shadow:0 18px 40px rgba(18,56,67,0.13);
  --hero-overlay-1:rgba(19,125,148,0.10);
  --hero-overlay-2:rgba(32,170,184,0.12);
  --button-text:#f8feff;
  --topic-photo-filter:saturate(1.05);
}

/* Space - Holographic Data Pad */
body[data-theme="space"]{
  --bg:#091121;
  --bg-soft:#111c33;
  --panel:#111c34;
  --panel-2:#182645;
  --line:#304668;
  --text:#e9f0ff;
  --muted:#a8b7d8;
  --primary:#788bff;
  --primary-dark:#5263d5;
  --accent:#49c8ff;
  --gold1:#d9defe;
  --gold2:#8ea2ff;
  --gold-text:#1d275b;
  --shadow:0 20px 46px rgba(0,0,0,0.34);
  --hero-overlay-1:rgba(120,139,255,0.12);
  --hero-overlay-2:rgba(73,200,255,0.12);
  --button-text:#f4f7ff;
  --topic-photo-filter:saturate(1.05) contrast(1.04) brightness(0.92);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.16), transparent 24%),
    radial-gradient(circle at bottom right, rgba(0,0,0,0.05), transparent 26%),
    linear-gradient(180deg, var(--bg-soft), var(--bg));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  transition:
    background 0.35s ease,
    color 0.35s ease;
}

#topbar{
  position:fixed;
  top:18px;
  left:18px;
  right:18px;
  z-index:50;
  pointer-events:none;
}

.player-tag{
  position:absolute;
  top:0;
  left:0;
  font-size:18px;
  font-weight:700;
  letter-spacing:0.02em;
  color:color-mix(in srgb, var(--text) 45%, transparent);
  text-shadow:0 1px 0 rgba(255,255,255,0.18);
}

.star-score{
  position:absolute;
  top:0;
  right:0;
  width:84px;
  height:84px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:900;
  color:var(--gold-text);
  background:none;
  filter:
    drop-shadow(0 8px 20px rgba(0,0,0,0.10))
    var(--topbar-score-shadow);
}

.star-score::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(145deg, var(--gold1), var(--gold2));
  clip-path:polygon(50% 5%, 60% 34%, 92% 34%, 68% 54%, 76% 85%, 50% 67%, 24% 85%, 32% 54%, 8% 34%, 40% 34%);
  transform:scale(0.96);
  z-index:0;
}

.star-score span{
  position:relative;
  z-index:1;
}

#app{
  width:100%;
  max-width:1020px;
}

.card{
  width:100%;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--card-radius);
  padding:42px 30px;
  box-shadow:var(--shadow);
  text-align:center;
  transition:
    background 0.35s ease,
    border-color 0.35s ease,
    box-shadow 0.35s ease;
}
.menu-title{
  margin:0 0 10px;
  padding:14px 26px 16px;
  font-family:"Bauhaus 93", "Arial Black", sans-serif;
  font-size:clamp(34px, 6vw, 64px);
  line-height:1;
  color:#ffffff;
  background:#111111;
  border:3px solid #000000;
  border-radius:22px;
  box-shadow:
    0 0 0 3px rgba(255,255,255,0.08),
    0 14px 30px rgba(0,0,0,0.28);
  text-align:center;
  width:fit-content;
  margin-inline:auto;
}

h1{
  margin:0 0 10px;
  font-size:42px;
  letter-spacing:-0.02em;
}

h2{
  margin:0 0 10px;
  font-size:32px;
  letter-spacing:-0.02em;
}

h3{
  margin:0;
  font-size:22px;
  letter-spacing:-0.01em;
}

p{
  margin:12px auto;
  max-width:720px;
  line-height:1.75;
  color:var(--muted);
  font-size:17px;
}

strong{
  color:var(--text);
}

input{
  width:100%;
  max-width:420px;
  padding:16px 18px;
  margin-top:10px;
  border:1px solid var(--line);
  border-radius:999px;
  outline:none;
  font-size:17px;
  text-align:center;
  background:#fff;
  color:var(--text);
  box-shadow:0 8px 20px rgba(15,23,42,0.05);
}

body[data-theme="wildfire"] input,
body[data-theme="space"] input{
  background:rgba(255,255,255,0.06);
  color:var(--text);
  box-shadow:none;
}

input::placeholder{
  color:color-mix(in srgb, var(--muted) 74%, transparent);
}

button{
  display:block;
  width:100%;
  max-width:540px;
  margin:12px auto 0;
  padding:16px 18px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  color:var(--button-text);
  font-size:16px;
  font-weight:700;
  letter-spacing:0.01em;
  background:linear-gradient(135deg, var(--primary), var(--accent));
  box-shadow:0 12px 24px color-mix(in srgb, var(--primary) 26%, transparent);
  transition:transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease, background 0.25s ease;
}
.begin-btn{
  display:block;
  width:fit-content;
  min-width:220px;
  margin:14px auto 0;
  padding:14px 26px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  color:#ffffff;
  font-family:"Bauhaus 93", "Arial Black", sans-serif;
  font-size:22px;
  font-weight:600;
  letter-spacing:0.02em;
  text-align:center;
  background:linear-gradient(135deg, #2f2f2f, #000000);
  box-shadow:0 12px 24px rgba(0,0,0,0.24);
  transition:transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
}

.begin-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 28px rgba(0,0,0,0.32);
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 28px color-mix(in srgb, var(--primary) 32%, transparent);
}

button.secondary{
  background:color-mix(in srgb, var(--panel-2) 82%, white 18%);
  color:var(--primary-dark);
  border:1px solid var(--line);
  box-shadow:none;
}

button:disabled{
  background:#dbe4ef;
  color:#7a8797;
  cursor:not-allowed;
  box-shadow:none;
  transform:none;
}

.question-count,
.subtle{
  color:color-mix(in srgb, var(--muted) 90%, transparent);
}

.score-badge{
  display:inline-block;
  margin-top:10px;
  padding:10px 18px;
  border-radius:999px;
  background:var(--panel-2);
  border:1px solid var(--line);
  color:var(--primary-dark);
  font-weight:700;
}

.section-spacer{
  margin-top:24px;
}
.intro-screen{
  width:100%;
  min-height:calc(100vh - 48px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:12px;
}

.intro-title{
  margin:0;
  padding:14px 26px 16px;
  font-family:"Bauhaus 93", "Arial Black", sans-serif;
  font-size:clamp(34px, 6vw, 64px);
  line-height:1;
  color:#ffffff;
  background:#111111;
  border:3px solid #000000;
  border-radius:22px;
  box-shadow:
    0 0 0 3px rgba(255,255,255,0.08),
    0 14px 30px rgba(0,0,0,0.28);
  text-align:center;
}

.intro-entry{
  width:100%;
  max-width:460px;
  margin:auto 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.intro-label{
  margin:0 0 10px;
  font-size:13px;
  font-weight:800;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--muted);
}

.intro-entry input{
  margin-top:0;
}

.intro-entry button{
  margin-top:14px;
}

@media (max-width:700px){
  .intro-screen{
    min-height:calc(100vh - 36px);
    padding-top:6px;
  }

  .intro-title{
    border-radius:18px;
    padding:12px 18px 14px;
  }

  .intro-entry{
    max-width:100%;
  }
}

.topic-photo{
  width:100%;
  max-width:760px;
  height:220px;
  margin:18px auto 0;
  border-radius:22px;
  overflow:hidden;
  background-size:cover;
  background-position:center;
  border:1px solid var(--line);
  position:relative;
  filter:var(--topic-photo-filter);
  box-shadow:0 12px 28px rgba(15,23,42,0.08);
}

.topic-photo::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(255,255,255,0.06), rgba(255,255,255,0.04));
}
.menu-card{
  max-width: 1120px;
}

.menu-subtitle{
  margin-bottom:24px;
  font-family:"Bauhaus 93", "Arial Black", sans-serif;
  font-size: 20px;
  font-weight: 700;
  color:#36454F;
  letter-spacing: 0.01em;
}
.menu-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:18px;
  margin-top:24px;
}

.topic-card-btn{
  width:100%;
  max-width:none;
  margin:0;
  padding:0;
  border:none;
  border-radius:24px;
  overflow:hidden;
  text-align:left;
  background:var(--panel);
  color:var(--text);
  box-shadow:0 14px 30px rgba(15,23,42,0.08);
  border:1px solid var(--line);
  cursor:pointer;
  transition:transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}

.topic-card-btn:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 34px rgba(15,23,42,0.12);
}

.topic-card-btn:disabled{
  cursor:not-allowed;
  opacity:0.82;
  transform:none;
}

.topic-card-thumb{
  height:170px;
  background-size:cover;
  background-position:center;
  position:relative;
}

.topic-card-thumb::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.20), rgba(0,0,0,0.02));
}

.topic-card-body{
  padding:18px 18px 20px;
  background:linear-gradient(180deg, var(--panel), var(--panel-2));
}

.topic-card-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.topic-status{
  display:inline-flex;
  align-items:center;
  padding:7px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  letter-spacing:0.06em;
  text-transform:uppercase;
  background:color-mix(in srgb, var(--primary) 10%, white 90%);
  color:var(--primary-dark);
}

.topic-status.done{
  background:color-mix(in srgb, var(--success) 14%, white 86%);
  color:#166534;
}

.topic-card-body h3{
  margin:0 0 14px;
  font-size:22px;
  line-height:1.2;
  color:var(--text);
}

.topic-card-body{
  padding:18px 18px 20px;
  background:linear-gradient(180deg, var(--panel), var(--panel-2));
  text-align:center;
}

.topic-card-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.topic-card-body h3{
  margin:0 0 16px;
  font-size:22px;
  line-height:1.2;
  color:var(--text);
}

.topic-card-action{
  display:block;
  width:fit-content;
  min-width:220px;
  margin:16px auto 0;
  padding:14px 24px;
  border-radius:999px;
  font-family:"Bauhaus 93", "Arial Black", sans-serif;
  font-size:18px;
  font-weight:500;
  letter-spacing:0.02em;
  text-align:center;
  color:#ffffff;
  background:linear-gradient(135deg, #2f2f2f, #000000);
  box-shadow:0 12px 24px rgba(0,0,0,0.24);
}

.topic-card-btn:disabled .topic-card-action{
  background:linear-gradient(135deg, #7c8aa0, #98a6b8);
  color:#f4f7fb;
  box-shadow:none;
}

@media (max-width: 700px){
  .menu-grid{
    grid-template-columns:1fr;
    gap:16px;
  }

  .topic-card-thumb{
    height:150px;
  }

  .topic-card-body h3{
    font-size:20px;
  }
}

.flashcard-stage{
  width:100%;
  max-width:760px;
  margin:18px auto 0;
}

.flashcard{
  position:relative;
  min-height:250px;
  padding:28px 24px;
  text-align:left;
  overflow:hidden;
  color:var(--text);
  isolation:isolate;
}

.flashcard > * {
  position:relative;
  z-index:3;
}

.flashcard.slide-out{
  animation:slideOut 0.35s ease forwards;
}

.flashcard.slide-in{
  animation:slideIn 0.35s ease forwards;
}

@keyframes slideOut{
  from{opacity:1; transform:translateX(0);}
  to{opacity:0; transform:translateX(-70px);}
}

@keyframes slideIn{
  from{opacity:0; transform:translateX(70px);}
  to{opacity:1; transform:translateX(0);}
}

.flashcard-tag{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  background:color-mix(in srgb, var(--primary) 10%, white 90%);
  color:var(--primary-dark);
  font-size:13px;
  font-weight:700;
  letter-spacing:0.06em;
  text-transform:uppercase;
  margin-bottom:2px;
}

body[data-theme="wildfire"] .flashcard-tag,
body[data-theme="space"] .flashcard-tag{
  background:rgba(255,255,255,0.08);
  color:var(--text);
}

.flashcard-text{
  margin-top:16px;
  font-size:18px;
  line-height:1.85;
  color:var(--text);
  position:relative;
  z-index:4;
}

.flashcard-controls{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:22px;
  flex-wrap:wrap;
}

.flashcard-controls button{
  max-width:240px;
  margin:0;
  position:relative;
  z-index:4;
}

/* Archaeology Scroll Flashcard */
body[data-theme="kerma"] .flashcard{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.4), transparent 70%),
    repeating-linear-gradient(
      to bottom,
      rgba(116,82,43,0.05) 0px,
      rgba(116,82,43,0.05) 2px,
      transparent 2px,
      transparent 10px
    ),
    #f4e6c7;

  border:1px solid #b79260;
  border-radius:16px;

  box-shadow:
    inset 0 0 35px rgba(116,82,43,0.18),
    0 14px 40px rgba(70,45,20,0.25);

  padding:40px 28px;
  position:relative;
}

/* Scroll rods */
body[data-theme="kerma"] .flashcard::before,
body[data-theme="kerma"] .flashcard::after{
  content:"";
  position:absolute;
  left:-10px;
  right:-10px;
  height:18px;
  border-radius:999px;

  background:linear-gradient(180deg,#8a6034,#5f3d1d);
  box-shadow:0 3px 5px rgba(0,0,0,0.25);
}

body[data-theme="kerma"] .flashcard::before{
  top:-9px;
}

body[data-theme="kerma"] .flashcard::after{
  bottom:-9px;
}

/* Wildfire: Smart Tablet */
body[data-theme="wildfire"] .flashcard{
  min-height:265px;
  padding:34px 26px 28px;
  border-radius:18px;
  border:1px solid #6e4531;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), transparent 18%),
    linear-gradient(180deg, #2c1d17, #221713);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    inset 0 -1px 0 rgba(0,0,0,0.25),
    0 16px 36px rgba(0,0,0,0.30),
    0 0 26px rgba(215,91,33,0.09);
}

body[data-theme="wildfire"] .flashcard::before{
  content:"";
  position:absolute;
  top:12px;
  left:16px;
  right:16px;
  height:8px;
  border-radius:4px;
  background:linear-gradient(90deg, #1a0f0b, #2d1a12, #1a0f0b);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 2px 4px rgba(0,0,0,0.4);
  z-index:1;
}

body[data-theme="wildfire"] .flashcard::after{
  content:"";
  position:absolute;
  bottom:12px;
  left:20px;
  width:12px;
  height:12px;
  border-radius:2px;
  background:#3a2a20;
  box-shadow:
    inset 0 1px 2px rgba(0,0,0,0.6),
    0 1px 2px rgba(255,255,255,0.1);
  z-index:1;
}

/* Marine: Nautical Parchment */
body[data-theme="marine"] .flashcard{
  min-height:260px;
  padding:32px 28px;
  border-radius:16px;
  border:1px solid rgba(19,125,148,0.25);
  background:
    linear-gradient(135deg, rgba(245,255,255,0.6), rgba(220,245,250,0.4)),
    linear-gradient(45deg, rgba(151,202,212,0.15) 25%, transparent 25%, transparent 75%, rgba(151,202,212,0.15) 75%),
    linear-gradient(180deg, rgba(255,255,255,0.95), rgba(226,247,250,0.85));
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.8),
    inset 0 -2px 0 rgba(19,125,148,0.15),
    0 16px 36px rgba(18,56,67,0.20);
  backdrop-filter:blur(8px);
}

body[data-theme="marine"] .flashcard::before{
  content:"";
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  height:4px;
  border-radius:2px;
  background:linear-gradient(90deg, #4682b4, #5a9bb7);
  box-shadow:0 1px 2px rgba(0,0,0,0.15);
  z-index:1;
}

function applyTheme(themeName="default"){
  document.body.setAttribute("data-theme", themeName);
}

function initAudio(){
  if(!audioContext){
    audioContext=new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioContext.state==="suspended"){
    audioContext.resume();
  }
}

function playTone(frequency,duration,type,volume,delay=0){
  if(!soundEnabled) return;
  initAudio();

  const oscillator=audioContext.createOscillator();
  const gainNode=audioContext.createGain();
  const now=audioContext.currentTime + delay;

  oscillator.type=type;
  oscillator.frequency.setValueAtTime(frequency, now);

  gainNode.gain.setValueAtTime(0.0001, now);
  gainNode.gain.exponentialRampToValueAtTime(volume, now + 0.01);
  gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);

  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);

  oscillator.start(now);
  oscillator.stop(now + duration + 0.02);
}

function playClickSound(){
  playTone(540,0.08,"sine",0.02,0);
}

function playCorrectSound(){
  playTone(520,0.10,"sine",0.04,0);
  playTone(780,0.14,"sine",0.04,0.09);
}

function playWrongSound(){
  playTone(260,0.12,"triangle",0.035,0);
  playTone(190,0.18,"triangle",0.03,0.08);
}

function playCompleteSound(){
  playTone(523,0.12,"sine",0.045,0);
  playTone(659,0.12,"sine",0.045,0.12);
  playTone(784,0.18,"sine",0.05,0.24);
}

function startComp(index){
  currentComp=index;
  currentQuestion=0;
  currentCompScore=0;
  currentPartIndex=0;
  flashcardAnimating=false;

  applyTheme(comprehensions[index].theme);
  updateTopBar();

  document.getElementById("app").innerHTML=`
    <div class="card">
      <h2>${comprehensions[index].title}</h2>
      ${renderTopicPhoto(index)}
      <p class="subtle">Read the passage one card at a time. Read carefully, once the questions begin you can continue only from memory.</p>
      <div class="flashcard-stage">
        <div id="flashcardHolder"></div>
      </div>
      <div class="section-spacer">
        <button class="secondary" onclick="playClickSound(); showMenu()">Back</button>
      </div>
    </div>
  `;

  renderFlashcard("slide-in");
}

function renderTopicPhoto(index){
  return `<div class="topic-photo" style="background-image:url('${comprehensions[index].image}')"></div>`;
}

function renderFlashcard(animationClass=""){
  const totalParts=comprehensions[currentComp].parts.length;
  const partText=comprehensions[currentComp].parts[currentPartIndex];

  document.getElementById("flashcardHolder").innerHTML=`
    <div class="flashcard ${animationClass}">
      <div class="flashcard-tag">Segment ${currentPartIndex+1} of ${totalParts}</div>
      <div class="flashcard-text">${partText}</div>
      <div class="flashcard-controls">
        ${currentPartIndex>0 ? `<button class="secondary" onclick="playClickSound(); previousPart()">Previous</button>` : ``}
        <button onclick="playClickSound(); nextPart()">${currentPartIndex===totalParts-1 ? "Start Questions" : "Next Card"}</button>
      </div>
    </div>
  `;
}

function nextPart(){
  if(flashcardAnimating) return;

  const totalParts=comprehensions[currentComp].parts.length;
  if(currentPartIndex===totalParts-1){
    showQuestion();
    return;
  }

  flashcardAnimating=true;
  const card=document.querySelector(".flashcard");
  if(card){
    card.classList.remove("slide-in");
    card.classList.add("slide-out");
  }

  setTimeout(()=>{
    currentPartIndex++;
    renderFlashcard("slide-in");
    flashcardAnimating=false;
  },320);
}

function previousPart(){
  if(flashcardAnimating || currentPartIndex===0) return;

  flashcardAnimating=true;
  const card=document.querySelector(".flashcard");
  if(card){
    card.classList.remove("slide-in");
    card.classList.add("slide-out");
  }

  setTimeout(()=>{
    currentPartIndex--;
    renderFlashcard("slide-in");
    flashcardAnimating=false;
  },320);
}

function showQuestion(){
  updateTopBar();
  const q=comprehensions[currentComp].questions[currentQuestion];

  let html=`
    <div class="card">
      <h2>${comprehensions[currentComp].title}</h2>
      <p class="question-count">Question ${currentQuestion+1} of 6</p>
      <div class="flashcard-stage">
        <div class="flashcard slide-in">
          <div class="flashcard-tag">Question</div>
          <div class="flashcard-text">${q.q}</div>
        </div>
      </div>
      <div class="section-spacer">
  `;

  q.options.forEach((opt,i)=>{
    html+=`<button onclick="answer(${i})">${opt}</button>`;
  });

  html+=`</div></div>`;
  document.getElementById("app").innerHTML=html;
}

function answer(choice){
  const q=comprehensions[currentComp].questions[currentQuestion];
  const correct=choice===q.correct;

  if(correct){
    currentCompScore++;
    playCorrectSound();
  }else{
    playWrongSound();
  }

  updateTopBar();

postScore({
  type:"answer",
  player: playerName,
  participantId: participantId,
  comprehensionIndex: currentComp + 1,
  comprehensionTitle: comprehensions[currentComp].title,
  question: currentQuestion + 1,
  selected: choice,
  correct: correct,
  runningComprehensionScore: currentCompScore,
  runningTotalScore: totalScore + (correct ? 1 : 0),
  timestamp: new Date().toISOString()
});

  currentQuestion++;

  setTimeout(()=>{
    if(currentQuestion<comprehensions[currentComp].questions.length){
      showQuestion();
    }else{
      finishComp();
    }
  },50);
}

function finishComp(){
  completed[currentComp] = true;
  totalScore += currentCompScore;
  playCompleteSound();

  const entry = {
    player: playerName,
    score: currentCompScore,
    totalScore: totalScore,
    completedAt: new Date().toISOString()
  };

  localLeaderboard.perComp[currentComp].push(entry);
  localLeaderboard.perComp[currentComp].sort((a, b) =>
    b.score - a.score || a.player.localeCompare(b.player)
  );

  updateTotalLeaderboard();
  updateTopBar();

postScore({
  type: "completion",
  player: playerName,
  participantId: participantId,
  comprehensionIndex: currentComp + 1,
  comprehensionTitle: comprehensions[currentComp].title,
  score: currentCompScore,
  totalScore: totalScore,
  completedCount: completed.filter(Boolean).length,
  completedAt: new Date().toISOString()
});

  showCompLeaderboard();
}

function updateTotalLeaderboard(){
  const existingIndex=localLeaderboard.total.findIndex(item=>item.player===playerName);
  const completedCount=completed.filter(Boolean).length;

  const totalEntry={
    player:playerName,
    totalScore:totalScore,
    completedCount:completedCount,
    completedAt:new Date().toISOString()
  };

  if(existingIndex>=0){
    localLeaderboard.total[existingIndex]=totalEntry;
  }else{
    localLeaderboard.total.push(totalEntry);
  }

  localLeaderboard.total.sort((a,b)=>b.totalScore-a.totalScore || b.completedCount-a.completedCount || a.player.localeCompare(b.player));
}

function getTierClass(rank){
  if(rank===1) return "tier-s";
  if(rank<=3) return "tier-a";
  if(rank<=5) return "tier-b";
  if(rank<=8) return "tier-c";
  return "tier-d";
}

function getTierLabel(rank){
  if(rank===1) return "S";
  if(rank<=3) return "A";
  if(rank<=5) return "B";
  if(rank<=8) return "C";
  return "D";
}

function buildTierGroups(rows, isTotal=false){
  const grouped={S:[],A:[],B:[],C:[],D:[]};

  rows.forEach((row,index)=>{
    const rank=index+1;
    const label=getTierLabel(rank);
    grouped[label].push({
      rank,
      player:row.player,
      score:isTotal ? `${row.totalScore}/24` : `${row.score}/6`,
      extra:isTotal ? `${row.completedCount}/4 complete` : `total ${row.totalScore}/24`
    });
  });

  return grouped;
}

function renderLeaderboardWindow(rows, isTotal = false){
  if (!rows.length) {
    return `
      <div class="tier-board compact-board">
        <div class="tier-row tier-b">
          <div class="tier-label">#</div>
          <div class="tier-content">
            ${Array(5).fill().map((_, i) => `
              <div class="tier-item">
                <div>
                  <div class="tier-player">${i + 1}.</div>
                  <div class="tier-meta">${isTotal ? 'No scores' : 'No scores'}</div>
                </div>
                <div class="tier-score">-</div>
              </div>
            `).join("")}
          </div>
        </div>
      </div>
    `;
  }

  // Always show exactly 5 rows - pad with empty rows if needed
  const displayRows = [...rows.slice(0, 5)];
  while (displayRows.length < 5) {
    displayRows.push({
      rank: displayRows.length + 1,
      player: "",
      score: isTotal ? 0 : 0,
      totalScore: 0,
      completedCount: 0,
      isCurrentPlayer: false
    });
  }

  return `
    <div class="tier-board compact-board">
      <div class="tier-row tier-b">
        <div class="tier-label">#</div>
        <div class="tier-content">
          ${displayRows.map(row => `
            <div class="tier-item ${row.isCurrentPlayer ? 'current-player' : ''}">
              <div>
                <div class="tier-player">${row.rank}${row.player ? '. ' + escapeHtml(row.player) : '.'}</div>
                <div class="tier-meta">
                  ${
                    isTotal
                      ? `${row.completedCount || 0}/4 completed`
                      : `Comprehension score`
                  }
                </div>
              </div>
              <div class="tier-score">
                ${row.player ? (isTotal ? row.totalScore : row.score) : '-'}
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>
  `;
}

async function showCompLeaderboard(){
  updateTopBar();

  const rows = await fetchLeaderboard("compLeaderboard", currentComp + 1);
  const visibleRows = getCenteredLeaderboardWindow(rows, playerName, 5);
  const allDone = completed.every(Boolean);

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Comprehension Complete</h2>
      ${renderTopicPhoto(currentComp)}
      <p><strong>${currentCompScore}/6</strong></p>
      <p>${comprehensions[currentComp].title}</p>
      <p class="subtle">You are shown with two players above and two below when available.</p>
      ${renderLeaderboardWindow(visibleRows, false)}
      <div class="section-spacer">
        <button onclick="playClickSound(); ${allDone ? 'showFinalLeaderboard()' : 'showMenu()'}">
          ${allDone ? 'Final Leaderboard' : 'Continue'}
        </button>
      </div>
    </div>
  `;
}

function closeStudyWindow() {
  window.close();

  setTimeout(() => {
    alert("If this tab did not close automatically, please close it manually and return to Qualtrics.");
  }, 300);
}

async function showFinalLeaderboard(){
  applyTheme("default");
  currentComp = null;
  updateTopBar();

  const rows = await fetchLeaderboard("finalLeaderboard");
  const visibleRows = getCenteredLeaderboardWindow(rows, playerName, 5);

  document.getElementById("app").innerHTML = `
    <div class="card">
      <div class="hero">
        <div class="hero-art"></div>
        <div class="hero-copy"></div>
      </div>
      <h2>Final Leaderboard</h2>
      <p><strong>${totalScore}/24</strong></p>
      <p class="subtle">You are shown in context with nearby players on the global leaderboard.</p>
      ${renderLeaderboardWindow(visibleRows, true)}
      <div class="section-spacer">
        <p class="subtle">
          You have finished the game. Click the button below to close this window and return to the Qualtrics survey.
        </p>
        <button onclick="playClickSound(); closeStudyWindow()">Return to Qualtrics</button>
      </div>
    </div>
  `;
}
async function fetchLeaderboard(type, comprehensionIndex = null){
  const url = new URL(SCRIPT_URL);
  url.searchParams.set("type", type);

  if (comprehensionIndex !== null) {
    url.searchParams.set("comprehensionIndex", comprehensionIndex);
  }

  try {
    const res = await fetch(url.toString());
    const data = await res.json();
    return data.rows || [];
  } catch (err) {
    console.error("Leaderboard fetch failed:", err);
    return [];
  }
}

function getCenteredLeaderboardWindow(rows, currentPlayer, size = 5){
  if (!rows || !rows.length) return [];

  const playerIndex = rows.findIndex(row => row.player === currentPlayer);

  if (playerIndex === -1) {
    return rows.slice(0, size).map((row, index) => ({
      ...row,
      rank: index + 1,
      isCurrentPlayer: false
    }));
  }

  let start = Math.max(0, playerIndex - 2);
  let end = start + size;

  if (end > rows.length) {
    end = rows.length;
    start = Math.max(0, end - size);
  }

  return rows.slice(start, end).map((row, index) => ({
    ...row,
    rank: start + index + 1,
    isCurrentPlayer: row.player === currentPlayer
  }));
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, function(m){
    return ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    })[m];
  });
}


document.addEventListener("click", initAudio, { once:true });

askName();
</script>
