<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Quest</title>
<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --primary:#2563eb;
  --primary-dark:#1d4ed8;
  --success:#16a34a;
  --border:#dbe3ef;
  --soft:#eef4ff;
}
*{box-sizing:border-box;}
body{
  font-family:Arial, sans-serif;
  max-width:900px;
  margin:auto;
  padding:20px;
  background:var(--bg);
  color:var(--text);
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}
.header-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px 18px;
  margin-bottom:18px;
  position:sticky;
  top:12px;
  z-index:10;
}
.header-bar .meta{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  font-weight:bold;
}
button{
  padding:12px 14px;
  margin:8px 0;
  width:100%;
  max-width:420px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
  font-size:16px;
}
button:hover{background:var(--primary-dark);}
button.secondary{
  background:#e5e7eb;
  color:var(--text);
}
button.secondary:hover{background:#d1d5db;}
button:disabled,.completed{
  background:#cbd5e1;
  color:#475569;
  cursor:not-allowed;
}
input{
  padding:12px;
  width:100%;
  max-width:420px;
  border:1px solid var(--border);
  border-radius:12px;
  font-size:16px;
}
.question-count,
.subtle{
  color:var(--muted);
}
.leaderboard{
  width:100%;
  margin-top:16px;
  border-collapse:collapse;
  overflow:hidden;
  border-radius:12px;
}
.leaderboard th,
.leaderboard td{
  text-align:left;
  padding:12px;
  border-bottom:1px solid var(--border);
}
.leaderboard th{
  background:var(--soft);
}
.highlight{
  background:#effcf3;
}
.score-badge{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  background:#e8f5e9;
  color:#166534;
  font-weight:bold;
}
.section-spacer{margin-top:24px;}
@media (max-width:640px){
  .header-bar{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>
<div id="topbar"></div>
<div id="app"></div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwEoXl7PdCM-N_pVpO0YypKNJGVgEjZoFwz93A0ZEdy89Q4C-7tUtg3yycC14_4gR2BnA/exec";

let playerName="";
let currentComp=null;
let currentQuestion=0;
let currentCompScore=0;
let totalScore=0;
let completed=[false,false,false,false];
let localLeaderboard={ perComp:[[],[],[],[]], total:[] };

const comprehensions=[
{
  title:"The Science of Sleep",
  text:"Sleep helps the brain consolidate memories and regulate emotion.",
  questions:[
    {q:"Sleep helps consolidate:",options:["Memories","Bones","Hair","Eyes"],correct:0},
    {q:"Sleep affects:",options:["Emotion","Weather","Height","Gravity"],correct:0},
    {q:"The passage focuses on:",options:["Sleep benefits","Exercise","Diet","Dreams"],correct:0},
    {q:"Sleep is important for:",options:["Cognition","Shoes","Cars","Trees"],correct:0},
    {q:"The brain processes during sleep:",options:["Memories","Metal","Plastic","Sand"],correct:0},
    {q:"The main topic is:",options:["Sleep","Food","Music","Sound"],correct:0}
  ]
},
{
  title:"Understanding Attention",
  text:"Attention allows people to focus on important stimuli while ignoring distractions.",
  questions:[
    {q:"Attention helps people:",options:["Focus","Sleep","Fly","Swim"],correct:0},
    {q:"Selective attention ignores:",options:["Irrelevant stimuli","Food","Water","Gravity"],correct:0},
    {q:"Attention is a:",options:["Psychological process","Bone","Planet","Chemical"],correct:0},
    {q:"Attention is useful in:",options:["Busy environments","Deserts","Mountains","Oceans"],correct:0},
    {q:"Selective attention processes:",options:["Relevant information","Nothing","Noise","Heat"],correct:0},
    {q:"The topic is:",options:["Attention","Taste","Hearing","Colour"],correct:0}
  ]
},
{
  title:"Motivation and Behaviour",
  text:"Motivation drives goal-directed behaviour and can be intrinsic or extrinsic.",
  questions:[
    {q:"Motivation influences:",options:["Behaviour","Colour","Weather","Gravity"],correct:0},
    {q:"Intrinsic motivation means:",options:["Internal enjoyment","Money","Fear","Punishment"],correct:0},
    {q:"Motivation helps people:",options:["Reach goals","Forget goals","Lose goals","Ignore goals"],correct:0},
    {q:"Motivation may be:",options:["Internal","External","Both","None"],correct:2},
    {q:"Intrinsic motivation involves:",options:["Satisfaction","Reward","Pain","Loss"],correct:0},
    {q:"The topic is:",options:["Motivation","Sleep","Vision","Hearing"],correct:0}
  ]
},
{
  title:"How Memory Works",
  text:"Memory involves encoding, storing and retrieving information.",
  questions:[
    {q:"Memory involves:",options:["Encoding","Storage","Retrieval","All of these"],correct:3},
    {q:"Short term memory holds information:",options:["Temporarily","Forever","Never","Randomly"],correct:0},
    {q:"Long term memory stores information:",options:["Long periods","Seconds","Minutes","Hours only"],correct:0},
    {q:"Memory processes include:",options:["Encoding","Storage","Retrieval","All"],correct:3},
    {q:"The passage discusses:",options:["Memory","Vision","Taste","Smell"],correct:0},
    {q:"Information is retrieved from:",options:["Memory","Shoes","Cars","Sand"],correct:0}
  ]
}
];

function postScore(payload){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify(payload)
  }).catch(()=>{});
}

function updateTopBar(){
  if(!playerName){
    document.getElementById("topbar").innerHTML="";
    return;
  }
  const finishedCount=completed.filter(Boolean).length;
  document.getElementById("topbar").innerHTML=`
    <div class="header-bar">
      <div>
        <strong>Learning Quest</strong><br>
        <span class="subtle">Player: ${escapeHtml(playerName)}</span>
      </div>
      <div class="meta">
        <span>Running score: ${totalScore}/24</span>
        <span>Completed: ${finishedCount}/4</span>
      </div>
    </div>
  `;
}

function escapeHtml(text){
  const div=document.createElement('div');
  div.textContent=text;
  return div.innerHTML;
}

function askName(){
  updateTopBar();
  document.getElementById("app").innerHTML=`
    <div class="card">
      <h1>Learning Quest</h1>
      <p>Enter your name to begin the reading comprehension game.</p>
      <input id="name" maxlength="30" placeholder="Your name" />
      <br><br>
      <button onclick="start()">Begin</button>
    </div>
  `;
}

function start(){
  const enteredName=document.getElementById("name").value.trim();
  if(!enteredName){
    alert("Please enter your name.");
    return;
  }
  playerName=enteredName;
  updateTopBar();
  showMenu();
}

function showMenu(){
  updateTopBar();
  let html=`<div class="card"><h1>Learning Quest</h1><h3>Select a Reading Challenge</h3><p class="subtle">Complete all 4 comprehensions. A leaderboard appears after every challenge, and a final total leaderboard appears at the end.</p>`;

  comprehensions.forEach((c,i)=>{
    const disabled=completed[i]?"disabled":"";
    const label=completed[i]?`${c.title} ✓ Completed`:c.title;
    html+=`<button ${disabled} onclick="startComp(${i})">${label}</button>`;
  });

  if(completed.every(Boolean)){
    html+=`<div class="section-spacer"><button onclick="showFinalLeaderboard()">View Final Total Leaderboard</button></div>`;
  }

  html+=`</div>`;
  document.getElementById("app").innerHTML=html;
}

function startComp(index){
  currentComp=index;
  currentQuestion=0;
  currentCompScore=0;
  updateTopBar();

  document.getElementById("app").innerHTML=`
    <div class="card">
      <h2>${comprehensions[index].title}</h2>
      <p>${comprehensions[index].text}</p>
      <div class="section-spacer">
        <span class="score-badge">Current comprehension score: 0/6</span>
      </div>
      <div class="section-spacer">
        <button onclick="showQuestion()">Start Questions</button>
        <button class="secondary" onclick="showMenu()">Back to Menu</button>
      </div>
    </div>
  `;
}

function showQuestion(){
  updateTopBar();
  const q=comprehensions[currentComp].questions[currentQuestion];
  let html=`
    <div class="card">
      <h2>${comprehensions[currentComp].title}</h2>
      <p class="question-count">Question ${currentQuestion+1} of 6</p>
      <p><strong>Passage:</strong> ${comprehensions[currentComp].text}</p>
      <div class="section-spacer">
        <span class="score-badge">Comprehension score: ${currentCompScore}/6</span>
      </div>
      <div class="section-spacer">
        <h3>${q.q}</h3>
      </div>
  `;

  q.options.forEach((opt,i)=>{
    html+=`<button onclick="answer(${i})">${opt}</button>`;
  });

  html+=`</div>`;
  document.getElementById("app").innerHTML=html;
}

function answer(choice){
  const q=comprehensions[currentComp].questions[currentQuestion];
  const correct=choice===q.correct;
  if(correct) currentCompScore++;

  postScore({
    type:"response",
    player:playerName,
    comprehension:comprehensions[currentComp].title,
    comprehensionIndex:currentComp+1,
    question:currentQuestion+1,
    selected:choice,
    correct:correct,
    runningComprehensionScore:currentCompScore,
    runningTotalScore:totalScore + (correct ? 1 : 0),
    timestamp:new Date().toISOString()
  });

  currentQuestion++;

  if(currentQuestion<comprehensions[currentComp].questions.length){
    showQuestion();
  }else{
    finishComp();
  }
}

function finishComp(){
  completed[currentComp]=true;
  totalScore+=currentCompScore;

  const entry={
    player:playerName,
    score:currentCompScore,
    totalScore:totalScore,
    completedAt:new Date().toISOString()
  };

  localLeaderboard.perComp[currentComp].push(entry);
  localLeaderboard.perComp[currentComp].sort((a,b)=>b.score-a.score || a.player.localeCompare(b.player));

  updateTotalLeaderboard();

  postScore({
    type:"comprehension_complete",
    player:playerName,
    comprehension:comprehensions[currentComp].title,
    comprehensionIndex:currentComp+1,
    score:currentCompScore,
    totalScore:totalScore,
    completedAll:completed.every(Boolean),
    timestamp:new Date().toISOString()
  });

  showCompLeaderboard();
}

function updateTotalLeaderboard(){
  const existingIndex=localLeaderboard.total.findIndex(item=>item.player===playerName);
  const completedCount=completed.filter(Boolean).length;
  const totalEntry={
    player:playerName,
    totalScore:totalScore,
    completedCount:completedCount,
    completedAt:new Date().toISOString()
  };

  if(existingIndex>=0){
    localLeaderboard.total[existingIndex]=totalEntry;
  }else{
    localLeaderboard.total.push(totalEntry);
  }

  localLeaderboard.total.sort((a,b)=>b.totalScore-a.totalScore || b.completedCount-a.completedCount || a.player.localeCompare(b.player));
}

function renderLeaderboardRows(rows, type){
  if(!rows.length){
    return `<tr><td colspan="4">No scores recorded yet.</td></tr>`;
  }

  return rows.map((row,index)=>{
    const isCurrent=row.player===playerName;
    if(type==="comp"){
      return `
        <tr class="${isCurrent?'highlight':''}">
          <td>${index+1}</td>
          <td>${escapeHtml(row.player)}</td>
          <td>${row.score}/6</td>
          <td>${row.totalScore}/24</td>
        </tr>`;
    }
    return `
      <tr class="${isCurrent?'highlight':''}">
        <td>${index+1}</td>
        <td>${escapeHtml(row.player)}</td>
        <td>${row.totalScore}/24</td>
        <td>${row.completedCount}/4</td>
      </tr>`;
  }).join("");
}

function showCompLeaderboard(){
  updateTopBar();
  const rows=localLeaderboard.perComp[currentComp];
  const allDone=completed.every(Boolean);

  document.getElementById("app").innerHTML=`
    <div class="card">
      <h2>Challenge Complete</h2>
      <p>You scored <strong>${currentCompScore}/6</strong> on <strong>${comprehensions[currentComp].title}</strong>.</p>
      <p>Your running total is now <strong>${totalScore}/24</strong>.</p>

      <div class="section-spacer">
        <h3>${comprehensions[currentComp].title} Leaderboard</h3>
        <table class="leaderboard">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>Comprehension Score</th>
              <th>Running Total</th>
            </tr>
          </thead>
          <tbody>
            ${renderLeaderboardRows(rows,"comp")}
          </tbody>
        </table>
      </div>

      <div class="section-spacer">
        <button onclick="${allDone ? 'showFinalLeaderboard()' : 'showMenu()'}">${allDone ? 'View Final Total Leaderboard' : 'Return to Menu'}</button>
      </div>
    </div>
  `;
}

function showFinalLeaderboard(){
  updateTopBar();
  document.getElementById("app").innerHTML=`
    <div class="card">
      <h2>Final Total Leaderboard</h2>
      <p>All 4 comprehensions are complete. Your final score is <strong>${totalScore}/24</strong>.</p>
      <table class="leaderboard">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Total Score</th>
            <th>Completed</th>
          </tr>
        </thead>
        <tbody>
          ${renderLeaderboardRows(localLeaderboard.total,"total")}
        </tbody>
      </table>
      <div class="section-spacer">
        <button onclick="showMenu()">Back to Menu</button>
      </div>
    </div>
  `;
}

askName();
</script>
</body>
</html>
